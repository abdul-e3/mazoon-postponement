<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Department – Study Postponement Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1a7fd4;
    --blue-dark: #1568b0;
    --blue-light: #e8f3fc;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --green: #1a7a4a;
    --green-light: #e8f5ee;
    --white: #ffffff;
    --cream: #f7f9fc;
    --gray-100: #f0f4f8;
    --gray-200: #dde3ea;
    --gray-400: #9aa5b1;
    --gray-600: #4a5568;
    --gray-800: #1a202c;
    --shadow-sm: 0 2px 8px rgba(26,127,212,0.08);
    --shadow-md: 0 4px 20px rgba(26,127,212,0.12);
    --shadow-lg: 0 8px 40px rgba(26,127,212,0.16);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--gray-800);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--blue);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-md);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red), #e74c3c, var(--red));
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-logo {
    width: 40px; height: 40px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
  }
  .header-logo img { width: 100%; height: 100%; object-fit: cover; }
  .header-logo { background: white; }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--white);
    letter-spacing: 0.3px;
  }
  .header-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Notification bell */
  .notif-btn {
    position: relative;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 10px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: white;
    font-size: 18px;
    transition: background 0.2s;
  }
  .notif-btn:hover { background: rgba(255,255,255,0.25); }
  .notif-badge {
    position: absolute;
    top: 6px; right: 6px;
    width: 10px; height: 10px;
    background: var(--red);
    border-radius: 50%;
    border: 2px solid var(--blue);
    display: none;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.8; }
  }
  .notif-badge.active { display: block; }

  /* Stats bar */
  .stats-bar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 16px 32px;
    display: flex;
    gap: 32px;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stat-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .stat-icon.blue { background: var(--blue-light); }
  .stat-icon.green { background: var(--green-light); }
  .stat-icon.red { background: var(--red-light); }
  .stat-num {
    font-size: 22px;
    font-weight: 600;
    color: var(--gray-800);
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  /* ===== MAIN CONTENT ===== */
  .main {
    padding: 28px 32px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gray-800);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .new-badge {
    background: var(--red);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    animation: pulse 1.5s infinite;
    display: none;
  }
  .new-badge.active { display: inline-block; }
  .count-badge {
    background: var(--blue-light);
    color: var(--blue);
    font-size: 12px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
  }

  /* Section divider */
  .section-divider {
    margin: 32px 0 24px;
    border: none;
    border-top: 2px solid var(--gray-200);
    position: relative;
  }

  /* ===== REQUEST CARDS ===== */
  .requests-grid {
    display: grid;
    gap: 14px;
  }

  .request-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1.5px solid var(--gray-200);
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
    animation: slideIn 0.3s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .request-card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--blue);
  }
  .request-card.new-request {
    border-color: var(--blue);
    border-left: 4px solid var(--blue);
  }
  .request-card.approved {
    border-left: 4px solid var(--green);
  }
  .request-card.rejected {
    border-left: 4px solid var(--red);
  }

  .card-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .card-header:hover { background: var(--gray-100); }

  .student-info {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .student-avatar {
    width: 42px; height: 42px;
    background: var(--blue-light);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 16px;
    color: var(--blue);
    flex-shrink: 0;
  }
  .student-name {
    font-weight: 600;
    font-size: 15px;
    color: var(--gray-800);
  }
  .student-meta {
    font-size: 13px;
    color: var(--gray-400);
    margin-top: 2px;
  }

  .card-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-pill {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .status-pill.pending { background: var(--blue-light); color: var(--blue); }
  .status-pill.approved { background: var(--green-light); color: var(--green); }
  .status-pill.rejected { background: var(--red-light); color: var(--red); }

  .expand-icon {
    color: var(--gray-400);
    font-size: 18px;
    transition: transform 0.2s;
  }
  .expand-icon.open { transform: rotate(180deg); }

  .card-time {
    font-size: 12px;
    color: var(--gray-400);
  }

  /* ===== CARD DETAILS ===== */
  .card-details {
    display: none;
    border-top: 1.5px solid var(--gray-200);
    padding: 24px 20px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .card-details.open { display: block; }

  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  .detail-item label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gray-400);
    display: block;
    margin-bottom: 4px;
  }
  .detail-item span {
    font-size: 14px;
    color: var(--gray-800);
    font-weight: 500;
  }

  .reason-box {
    background: var(--gray-100);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 14px;
    color: var(--gray-600);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .reason-box strong {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 6px;
  }

  .doc-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--blue-light);
    color: var(--blue);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    margin-bottom: 20px;
    transition: background 0.2s;
  }
  .doc-link:hover { background: #d0e8f7; }

  /* ===== RESPONSE SECTION ===== */
  .response-section {
    border-top: 1.5px solid var(--gray-200);
    padding-top: 20px;
    margin-top: 4px;
  }
  .response-section h4 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 16px;
  }

  /* Comment */
  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 6px;
    display: block;
  }
  textarea.comment-box {
    width: 100%;
    border: 1.5px solid var(--gray-200);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--gray-800);
    resize: vertical;
    min-height: 80px;
    outline: none;
    background: var(--cream);
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  textarea.comment-box:focus {
    border-color: var(--blue);
    background: var(--white);
  }

  /* Decision buttons */
  .decision-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .decision-btn {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--gray-200);
    border-radius: 10px;
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--gray-600);
  }
  .decision-btn:hover { border-color: var(--gray-400); }
  .decision-btn.approve-btn.selected {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }
  .decision-btn.reject-btn.selected {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red);
  }

  /* Signature */
  .signature-area {
    margin-bottom: 20px;
  }
  .sig-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .sig-tab {
    padding: 6px 14px;
    border: 1.5px solid var(--gray-200);
    border-radius: 6px;
    background: var(--white);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--gray-400);
    transition: all 0.2s;
  }
  .sig-tab.active {
    background: var(--blue-light);
    border-color: var(--blue);
    color: var(--blue);
  }
  .sig-canvas-wrap {
    position: relative;
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    overflow: hidden;
    background: var(--white);
  }
  canvas.sig-canvas {
    display: block;
    width: 100%;
    height: 120px;
    cursor: crosshair;
    touch-action: none;
  }
  .sig-clear {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--gray-100);
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    color: var(--gray-600);
    font-family: 'DM Sans', sans-serif;
  }
  .sig-upload-area {
    display: none;
    border: 2px dashed var(--gray-200);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    position: relative;
    background: var(--cream);
  }
  .sig-upload-area input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .sig-upload-area p { font-size: 13px; color: var(--gray-400); }
  .sig-preview {
    display: none;
    max-height: 80px;
    margin: 8px auto 0;
  }

  /* Submit response button */
  .submit-response-btn {
    width: 100%;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .submit-response-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red), #e74c3c, var(--red));
  }
  .submit-response-btn:hover { background: var(--blue-dark); }
  .submit-response-btn:disabled { background: var(--gray-200); cursor: not-allowed; }

  /* Responded view */
  .responded-view {
    display: none;
  }
  .responded-result {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 12px;
  }
  .responded-result.approved { background: var(--green-light); color: var(--green); }
  .responded-result.rejected { background: var(--red-light); color: var(--red); }
  .responded-result .result-icon { font-size: 22px; }
  .responded-result .result-text { font-weight: 600; font-size: 15px; }
  .responded-comment { font-size: 13px; color: var(--gray-600); font-style: italic; margin-bottom: 8px; }
  .responded-sig { max-height: 60px; border: 1px solid var(--gray-200); border-radius: 6px; padding: 4px; }

  /* Delete button */
  .delete-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--red-light);
    color: var(--red);
    border: 1.5px solid var(--red);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 16px;
  }
  .delete-btn:hover {
    background: var(--red);
    color: white;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-400);
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  /* Responsive */
  @media (max-width: 640px) {
    .header { padding: 0 16px; }
    .stats-bar { padding: 12px 16px; gap: 16px; overflow-x: auto; }
    .main { padding: 16px; }
    .details-grid { grid-template-columns: 1fr; }
    .decision-row { flex-direction: column; }
  }
  .header-credit {
    margin-left: auto;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.8px;
    font-style: italic;
  }
</style>

    major: data.major || '',
    sponsor: data.sponsor || '',
    semester: data.semester || '',
    reasons: data.reasons || '',
    docUrl: data.docUrl || null,
    submittedAt: data.submittedAt || new Date().toISOString(),
    status: 'pending',
    comment: '',
    decision: '',
    signatureData: '',
    respondedAt: ''
  };
  requests.unshift(req);
  saveAndRender();
}

function saveAndRender() {
  localStorage.setItem('postpone_requests', JSON.stringify(requests));
  renderAll();
}

function renderAll() {
  const pending = requests.filter(r => r.status === 'pending');
  const responded = requests.filter(r => r.status !== 'pending');

  // Stats
  document.getElementById('statTotal').textContent = requests.length;
  document.getElementById('statPending').textContent = pending.length;
  document.getElementById('statApproved').textContent = requests.filter(r => r.status && r.status !== '').length;

  // Badges
  document.getElementById('newCount').textContent = pending.length;
  document.getElementById('respondedCount').textContent = responded.length;
  const newBadge = document.getElementById('newBadge');
  const notifBadge = document.getElementById('notifBadge');
  if (pending.length > 0) {
    newBadge.classList.add('active');
    notifBadge.classList.add('active');
  } else {
    newBadge.classList.remove('active');
    notifBadge.classList.remove('active');
  }

  // Render grids
  renderGrid('newRequestsGrid', pending, true);
  renderGrid('respondedRequestsGrid', responded, false);
}

function renderGrid(gridId, list, isNew) {
  const grid = document.getElementById(gridId);
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${isNew ? '📭' : '📂'}</div>
      <p>${isNew ? 'No new requests at the moment' : 'No responded requests yet'}</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(req => buildCard(req, isNew)).join('');
}

function buildCard(req, isNew) {
  const initials = req.studentName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
  const time = new Date(req.submittedAt).toLocaleString('en-GB', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
  const statusClass = req.status === 'approved' ? 'approved' : req.status === 'rejected' ? 'rejected' : 'pending';
  const statusLabel = req.status === 'approved' ? '✅ Approved' : req.status === 'rejected' ? '❌ Rejected' : '🕐 Pending';

  return `
  <div class="request-card ${isNew ? 'new-request' : req.status}" id="card-${req.id}">
    <div class="card-header" onclick="toggleCard(${req.id})">
      <div class="student-info">
        <div class="student-avatar">${initials}</div>
        <div>
          <div class="student-name">${req.studentName}</div>
          <div class="student-meta">ID: ${req.studentId} &nbsp;·&nbsp; ${req.major} &nbsp;·&nbsp; ${req.semester}</div>
        </div>
      </div>
      <div class="card-right">
        <div class="card-time">${time}</div>
        <span class="status-pill ${statusClass}">${statusLabel}</span>
        <span class="expand-icon" id="icon-${req.id}">▼</span>
      </div>
    </div>
    <div class="card-details" id="details-${req.id}">
      <!-- Student Details -->
      <div class="details-grid">
        <div class="detail-item"><label>Student Name</label><span>${req.studentName}</span></div>
        <div class="detail-item"><label>Student ID</label><span>${req.studentId}</span></div>
        <div class="detail-item"><label>Mobile</label><span>${req.studentMobile}</span></div>
        <div class="detail-item"><label>Email</label><span>${req.studentEmail}</span></div>
        <div class="detail-item"><label>Major</label><span>${req.major}</span></div>
        <div class="detail-item"><label>Sponsor</label><span>${req.sponsor || '—'}</span></div>
        <div class="detail-item"><label>Semester</label><span>${req.semester}</span></div>
        <div class="detail-item"><label>Submitted</label><span>${time}</span></div>
      </div>

      <div class="reason-box">
        <strong>Reason for Postponement</strong>
        ${req.reasons}
      </div>

      ${req.docUrl ? `<a href="${req.docUrl}" target="_blank" class="doc-link">📎 View Supporting Document</a>` : ''}

      <!-- Response Section -->
      <div class="response-section">
        ${isNew ? buildResponseForm(req) : buildRespondedView(req)}
      </div>
    </div>
  </div>`;
}

function buildResponseForm(req) {
  return `
    <h4>Your Response</h4>
    <!-- Comment -->
    <label class="field-label">Notes / Comments</label>
    <textarea class="comment-box" id="comment-${req.id}" placeholder="Add your notes or comments here..."></textarea>

    <!-- Decision -->
    <label class="field-label">Decision</label>
    

    <!-- PIN -->
    <label class="field-label">Employee PIN</label>
    <div class="pin-wrap">
      <input class="pin-input" type="password" id="pin-${req.id}" maxlength="6" placeholder="••••" oninput="verifyPin(${req.id})">
      <div class="pin-result" id="pin-result-${req.id}"></div>
    </div>

    <br>
    <button class="submit-response-btn" id="submit-${req.id}" onclick="submitResponse(${req.id})" disabled>
      Submit Response
    </button>`;
}

function buildRespondedView(req) {
  const isApproved = req.status === 'approved';
  const respondedTime = req.respondedAt ? new Date(req.respondedAt).toLocaleString('en-GB', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
  return `
    <div class="responded-view" style="display:block">
      <div class="responded-result ${req.status}">
        <span class="result-icon">${isApproved ? '✅' : '❌'}</span>
        <span class="result-text">${isApproved ? 'Approved' : 'Rejected'} &nbsp;·&nbsp; ${respondedTime}</span>
      </div>
      ${req.comment ? `<p class="responded-comment">"${req.comment}"</p>` : ''}
      ${req.employeeName ? `<div style="background:var(--blue-light);color:var(--blue);padding:10px 16px;border-radius:8px;font-weight:600;font-size:14px;margin-top:8px;">✍️ ${req.employeeName}</div>` : ''}
      <button class="delete-btn" onclick="deleteRequest(${req.id})">🗑️ Delete Request</button>
    </div>`;
}

// ===== INTERACTIONS =====
let selectedDecisions = {};

function toggleCard(id) {
  const details = document.getElementById(`details-${id}`);
  const icon = document.getElementById(`icon-${id}`);
  const isOpen = details.classList.contains('open');
  details.classList.toggle('open', !isOpen);
  icon.classList.toggle('open', !isOpen);

}

function selectDecision(id, decision) {
  selectedDecisions[id] = decision;
  document.getElementById(`approve-${id}`).classList.toggle('selected', decision === 'approved');
  document.getElementById(`reject-${id}`).classList.toggle('selected', decision === 'rejected');
  checkSubmitReady(id);
}

function checkSubmitReady(id) {
  const btn = document.getElementById(`submit-${id}`);
  if (btn && verifiedEmployees[id]) {
    btn.disabled = false;
  } else if (btn) {
    btn.disabled = true;
  }
}

function submitResponse(id) {
  const req = requests.find(r => r.id === id);
  if (!req) return;

  const comment = document.getElementById(`comment-${id}`)?.value || '';
  const decision = 'approved';

  const employeeName = verifiedEmployees[id];
  if (!employeeName) { alert('Please enter a valid PIN'); return; }

  req.status = decision;
  req.comment = comment;
  req.employeeName = employeeName;
  req.respondedAt = new Date().toISOString();

  saveAndRender();

  // ⚡ Send to N8N for further processing (email to student, PDF, Google Sheets)
  sendResponseToN8N(req);
}

function deleteRequest(id) {
  if (!confirm('Are you sure you want to delete this request?')) return;
  const req = requests.find(r => r.id === id);
  if (req) {
    let deleted = JSON.parse(localStorage.getItem('deleted_acc_requests') || '[]');
    deleted.push(req.studentId + '_' + req.submittedAt);
    localStorage.setItem('deleted_acc_requests', JSON.stringify(deleted));
  }
  requests = requests.filter(r => r.id !== id);
  saveAndRender();
}

// ===== PIN VERIFICATION =====
let verifiedEmployees = {};

async function verifyPin(id) {
  const pinInput = document.getElementById(`pin-${id}`);
  const pinResult = document.getElementById(`pin-result-${id}`);
  const pin = pinInput.value;

  if (pin.length < 4) {
    pinResult.style.display = 'none';
    verifiedEmployees[id] = null;
    checkSubmitReady(id);
    return;
  }

  try {
    const res = await fetch('https://mazoon1.abdulonline.online/webhook/verify-employee', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ pin })
    });
    const data = await res.json();
    const result = Array.isArray(data) ? data[0] : data;
    const info = result.json || result;
    const empName = info.employeeName || info.found === false ? null : info.employeeName;

    if (info.employeeName) {
      pinResult.textContent = '✅ ' + info.employeeName;
      pinResult.className = 'pin-result success';
      pinResult.style.display = 'block';
      verifiedEmployees[id] = info.employeeName;
    } else {
      pinResult.textContent = '❌ Invalid PIN';
      pinResult.className = 'pin-result error';
      pinResult.style.display = 'block';
      verifiedEmployees[id] = null;
    }
  } catch(e) {
    console.error('PIN verify error:', e);
    verifiedEmployees[id] = null;
  }
  checkSubmitReady(id);
}

function sendResponseToN8N(req) {
  fetch('https://mazoon1.abdulonline.online/webhook/postponement-response', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      studentName:   req.studentName,
      studentId:     req.studentId,
      studentEmail:  req.studentEmail,
      studentMobile: req.studentMobile,
      major:         req.major,
      sponsor:       req.sponsor,
      semester:      req.semester,
      reasons:       req.reasons,
      decision:      req.status,
      comment:       req.comment,
      employeeName:  req.employeeName,
      submittedAt:   req.submittedAt,
      respondedAt:   req.respondedAt
    })
  }).then(() => console.log('Sent to N8N ✅'))
    .catch(err => console.error('N8N error:', err));
}

// ===== CANVAS SIGNATURE =====
let canvases = {};

function initCanvas(id) {
  const canvas = document.getElementById(`canvas-${id}`);
  if (!canvas || canvases[id]) return;
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      return [(e.touches[0].clientX - rect.left) * scaleX, (e.touches[0].clientY - rect.top) * scaleY];
    }
    return [(e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY];
  }

  canvas.addEventListener('mousedown', e => { drawing = true; [lastX, lastY] = getPos(e); });
  canvas.addEventListener('mousemove', e => {
    if (!drawing) return;
    const [x, y] = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.strokeStyle = '#1a202c';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.stroke();
    [lastX, lastY] = [x, y];
  });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; [lastX, lastY] = getPos(e); });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!drawing) return;
    const [x, y] = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y);
    ctx.strokeStyle = '#1a202c'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();
    [lastX, lastY] = [x, y];
  });
  canvas.addEventListener('touchend', () => drawing = false);
  canvases[id] = true;
}

function clearCanvas(id) {
  const canvas = document.getElementById(`canvas-${id}`);
  if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function switchSigTab(id, tab, btn) {
  document.querySelectorAll(`#details-${id} .sig-tab`).forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`sig-draw-${id}`).style.display = tab === 'draw' ? 'block' : 'none';
  document.getElementById(`sig-upload-${id}`).style.display = tab === 'upload' ? 'block' : 'none';
  if (tab === 'draw') setTimeout(() => initCanvas(id), 50);
}

function uploadSig(id, input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById(`sig-preview-${id}`);
    preview.src = e.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(input.files[0]);
}

function scrollToNew() {
  document.getElementById('newSection').scrollIntoView({ behavior: 'smooth' });
}

// ===== N8N POLLING =====
// Ask N8N for new requests every 10 seconds
async function pollForNewRequests() {
  try {
    const res = await fetch('https://mazoon1.abdulonline.online/webhook/get-requests');
    if (!res.ok) return;
    const data = await res.json();
    const incoming = Array.isArray(data) ? data : [data];
    
    let hasNew = false;
    const deleted = JSON.parse(localStorage.getItem('deleted_acc_requests') || '[]');
    incoming.forEach(item => {
      const req = item.json || item;
      if (!req.studentId) return;
      // Skip if already has a decision (responded by finance)
      if (req.decision && req.decision !== '') return;
      // Skip deleted
      const key = req.studentId + '_' + req.submittedAt;
      if (deleted.includes(key)) return;
      // Check if already exists
      const exists = requests.find(r => r.studentId === req.studentId && r.submittedAt === req.submittedAt);
      if (!exists) {
        requests.unshift({
          id: Date.now() + Math.random(),
          studentName:   req.studentName   || '',
          studentId:     req.studentId     || '',
          studentMobile: req.studentMobile || '',
          studentEmail:  req.studentEmail  || '',
          major:         req.major         || '',
          sponsor:       req.sponsor       || '',
          semester:      req.semester      || '',
          reasons:       req.reasons       || '',
          docUrl:        req.docUrl        || null,
          submittedAt:   req.submittedAt   || new Date().toISOString(),
          status:        'pending',
          comment:       '',
          signatureData: '',
          respondedAt:   ''
        });
        hasNew = true;
      }
    });

    if (hasNew) saveAndRender();
  } catch(e) {
    console.log('Polling error:', e);
  }
}
setInterval(pollForNewRequests, 10000);
pollForNewRequests(); // Run immediately on load



// ===== INIT =====
renderAll();
</script>
